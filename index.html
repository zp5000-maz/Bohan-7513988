<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博瀚 AI 英語評分系統</title>
    <style>
        :root { --primary-blue: #00d2ff; --dark-bg: #121212; }
        body { background-color: var(--dark-bg); color: white; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        
        /* 登入介面 */
        #login-box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        
        /* 測驗介面 */
        #quiz-box { display: none; }
        .question-text { font-size: 24px; color: #ffcc00; margin-bottom: 10px; }
        .score-circle { font-size: 80px; font-weight: bold; color: #00ffcc; margin: 20px 0; text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        .feedback-text { font-size: 20px; height: 30px; color: #aaa; }
        
        /* KTV 音量動畫 */
        #visualizer { width: 100%; height: 60px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; margin: 20px 0; background: #000; border-radius: 5px; overflow: hidden; }
        .bar { flex: 1; background: linear-gradient(to top, #00d2ff, #3a7bd5); min-height: 2px; }

        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login { background: #3a7bd5; color: white; }
        .btn-record { background: #ff4b2b; color: white; }
        .btn-next { background: #00c9ff; color: white; margin-top: 20px; }
        .recording { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h2 style="color:var(--primary-blue)">博瀚英語登 </h2>
        <p style="font-size:12px; color:#888;">博瀚文理曾益慧老師整理</p>
        <input type="text" id="username" placeholder="請輸入姓名">
        <input type="password" id="password" placeholder="請輸入密碼">
        <button class="btn-login" onclick="login()">進入學習</button>
    </div>

    <div id="quiz-box">
        <div class="question-text" id="q-eng">Let us dance together</div>
        <div style="color:#888" id="q-chi">讓我們一起跳舞</div>
        
        <div class="score-circle" id="score">0</div>
        <div class="feedback-text" id="feedback">準備好了嗎？</div>

        <div id="visualizer">
            </div>

        <button id="recordBtn" class="btn-record">🎤 按我錄音</button>
        <button class="btn-next" onclick="nextQuestion()">儲存並下一題 →</button>
    </div>
</div>

<script>
    // --- ⚠️ 重要：請在此處填入您的 GAS 部署網址 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycby7-W-gJsHa-6YdoHQlz7YnpOYLKyBzRDM8Yv78Bk13k_ypO39qEQLd3gyfn7prJs_3Yg/exec"; 
    
    let currentUser = "";
    let isRecording = false;
    let audioContext, analyser, dataArray, animationId;

    // 1. 登入邏輯
    async function login() {
        const name = document.getElementById('username').value.trim();
        const pwd = document.getElementById('password').value.trim();
        
        if(!name || !pwd) return alert("請輸入姓名與密碼");

        try {
            const resp = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', name: name, password: pwd })
            });
            const result = await resp.json();
            
            if(result.status === 'success') {
                currentUser = name;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('quiz-box').style.display = 'block';
                initVisualizer(); // 登入後初始化動畫容器
            } else {
                alert("姓名或密碼不正確，請重新檢查");
            }
        } catch (e) {
            alert("載入失敗，請檢查網路或 API 網址");
        }
    }

    // 2. KTV 動畫初始化
    function initVisualizer() {
        const visualizer = document.getElementById('visualizer');
        for(let i=0; i<25; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }
    }

    // 3. 啟動收音動畫
    async function startVisualizer() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);
        
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        renderFrame();
    }

    function renderFrame() {
        animationId = requestAnimationFrame(renderFrame);
        analyser.getByteFrequencyData(dataArray);
        const bars = document.getElementsByClassName('bar');
        for (let i = 0; i < bars.length; i++) {
            const barHeight = (dataArray[i] || 0) * 0.5;
            bars[i].style.height = barHeight + 'px';
        }
    }

    // 4. 錄音按鈕行為
    const recordBtn = document.getElementById('recordBtn');
    recordBtn.onclick = async () => {
        if (!isRecording) {
            // 開始錄音
            isRecording = true;
            recordBtn.innerText = "🛑 停止錄音";
            recordBtn.classList.add('recording');
            document.getElementById('feedback').innerText = "正在聽你說話...";
            await startVisualizer();
            // 此處應加入 MediaRecorder 邏輯...
        } else {
            // 停止錄音
            isRecording = false;
            recordBtn.innerText = "🎤 按我錄音";
            recordBtn.classList.remove('recording');
            cancelAnimationFrame(animationId);
            mockEvaluation(); // 這裡示範呼叫評分邏輯
        }
    };

    // 5. 評分邏輯 (模擬發送給 GAS)
    async function mockEvaluation() {
        document.getElementById('feedback').innerText = "AI 正在評分中...";
        
        // 實際運作時，這裡要傳送錄音轉出的文字
        const payload = {
            action: 'submitScore',
            name: currentUser,
            question: document.getElementById('q-eng').innerText,
            transcript: "這裡放辨識結果", 
            correctText: document.getElementById('q-eng').innerText
        };

        const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await resp.json();
        
        // 顯示分數與老師指定的階層評語
        document.getElementById('score').innerText = res.score;
        document.getElementById('feedback').innerText = res.feedback;
    }

    function nextQuestion() {
        // 切換題目的邏輯
        location.reload(); // 暫時用重整演示
    }
</script>

</body>
</html>
