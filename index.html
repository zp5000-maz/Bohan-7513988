<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚 AI 英語 V56.5</title>
    <style>
        :root { --p: #00d4ff; --bg: #050505; --s: #00ffbb; --d: #ff4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #111; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-p { background: var(--p); color: #000; }
        .btn-d { background: #222; color: #fff; border: 1px solid #444; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; }
        #wave { width: 100%; height: 50px; background: #000; border-radius: 10px; margin: 10px 0; border: 1px solid #222; }
    </style>
</head>
<body>
<div class="card">
    <div id="login-ui">
        <h2 style="color:var(--p)">博瀚 AI 英語</h2>
        <input type="text" id="user" placeholder="學生姓名">
        <input type="password" id="pass" placeholder="密碼">
        <button class="btn btn-p" onclick="doLogin()">登入</button>
    </div>
    <div id="main-ui" style="display:none">
        <div id="q-eng" style="font-size: 22px; color: #ffc107; font-weight: bold; margin-bottom: 10px;"></div>
        <div id="score" style="font-size: 60px; font-weight: 900; color: var(--s);">0 分</div>
        <canvas id="wave"></canvas>
        <button class="btn btn-d" onclick="sayIt()">🔊 聽範例</button>
        <button id="rec-btn" class="btn btn-d" style="color:var(--s)" onclick="runRec()">🎙️ 開始錄音</button>
        <button id="next-btn" class="btn btn-p" onclick="nextQ()" disabled>儲存並下一題</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwTHJwaGhwzlZ9JOmPMYDFk3SXSXHBDUPp5OMCqwYRfPYwdcSsGaSirydk1JysezR7BPA/exec"; 
    let db={users:[],questions:[]}, stu="", cur=0, isRec=false, mr, chunks=[], audioCtx, ana, aniId;

    window.onload = async () => { try { const r = await fetch(API); db = await r.json(); } catch(e) { alert("連線失敗"); } };

    function doLogin() {
        const u = document.getElementById('user').value.trim(), p = document.getElementById('pass').value.trim();
        if (db.users.some(x => x[0] === u && x[1] === p)) {
            stu = u; document.getElementById('login-ui').style.display='none';
            document.getElementById('main-ui').style.display='block'; showQ();
        } else alert("登入失敗");
    }

    function showQ() {
        const q = db.questions[cur];
        document.getElementById('q-eng').innerText = q.eng;
        document.getElementById('score').innerText = "0 分";
        document.getElementById('next-btn').disabled = true;
    }

    function sayIt() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(db.questions[cur].eng);
        u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }

    function draw() {
        if (!isRec) return;
        aniId = requestAnimationFrame(draw);
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteFrequencyData(data);
        const cvs = document.getElementById('wave'), ctx = cvs.getContext('2d');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
        for (let i = 0; i < 20; i++) {
            const h = (data[i] / 255) * cvs.height;
            ctx.fillStyle = `hsl(${180 + i * 5}, 100%, 50%)`;
            ctx.fillRect(i * (cvs.width/20), cvs.height - h, (cvs.width/20)-2, h);
        }
    }

    async function runRec() {
        if (!isRec) {
            try {
                // 關鍵：確保 AudioContext 在點擊時被啟動（iOS 要求）
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                const stream = await navigator.mediaDevices.getUserMedia({ audio: { 
                    channelCount: 1,
                    sampleRate: 16000, // 強制低取樣率提高辨識率
                    echoCancellation: true 
                }});

                ana = audioCtx.createAnalyser();
                audioCtx.createMediaStreamSource(stream).connect(ana);

                const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
                mr = new MediaRecorder(stream, { mimeType: mime });
                chunks = [];

                mr.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                mr.onstop = async () => {
                    document.getElementById('rec-btn').innerText = "🤖 辨識中...";
                    const blob = new Blob(chunks, { type: mime });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'recognize', audio: base64, mimeType: mime }) });
                        const res = await r.json();
                        handleResult(res.transcript);
                    };
                    stream.getTracks().forEach(t => t.stop());
                };

                mr.start(); isRec = true; draw();
                document.getElementById('rec-btn').innerText = "⏹ 停止錄音";
                document.getElementById('rec-btn').style.color = "var(--d)";
            } catch (e) { alert("麥克風啟動失敗：" + e.message); }
        } else {
            isRec = false; cancelAnimationFrame(aniId); mr.stop();
            document.getElementById('rec-btn').disabled = true;
        }
    }

    function handleResult(txt) {
        document.getElementById('rec-btn').disabled = false;
        document.getElementById('rec-btn').innerText = "🎙️ 開始錄音";
        document.getElementById('rec-btn').style.color = "var(--s)";
        
        if (!txt || txt === "EMPTY" || txt.startsWith("ERROR")) { 
            alert("系統沒聽到聲音，請靠近一點或說大聲一點喔！"); 
            return; 
        }

        const target = db.questions[cur].eng.toLowerCase().replace(/[.,!?]/g,"").split(" ");
        const spoken = txt.toLowerCase().replace(/[.,!?]/g,"").split(" ");
        let match = 0;
        target.forEach(w => { if(spoken.includes(w)) match++; });
        let score = Math.floor((match / target.length) * 100);
        
        document.getElementById('score').innerText = score + " 分";
        document.getElementById('next-btn').disabled = false;
        window.lastTxt = txt;

        if (score >= 90) alert("太厲害了，好棒棒！");
        else if (score >= 60) alert("還不錯喔，再加油。");
        else alert("請認真學習。");
    }

    function nextQ() {
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ student: stu, eng: db.questions[cur].eng, score: document.getElementById('score').innerText, recognizedText: window.lastTxt }) });
        if (cur < db.questions.length - 1) { cur++; showQ(); }
        else { alert("全部完成！"); location.reload(); }
    }
</script>
</body>
</html>
