<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>博瀚 AI 英語 V55.9.7 修正版</title>
    <style>
        :root { --primary: #00d4ff; --gold: #ffc107; --bg: #050505; --card: #111; --success: #00ffbb; --warning: #ffc107; --danger: #ff4444; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .card { background: rgba(17, 17, 17, 0.95); padding: 20px; border-radius: 30px; width: 92%; max-width: 440px; height: 92vh; display: flex; flex-direction: column; text-align: center; border: 1px solid #00d4ff44; position: relative; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-sizing: border-box; }
        .logo-area { margin-top: 30px; position: relative; display: inline-block; width: 110px; height: 110px; }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); background: #000; }
        .browser-tip { color: var(--gold); font-size: 13px; margin-top: 15px; background: rgba(255, 193, 7, 0.1); padding: 8px 15px; border-radius: 10px; border: 1px dashed var(--gold); display: inline-block; }
        #login-ui { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #loading-zone { width: 100%; display: none; margin-top: 20px; }
        .progress-track { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #0080ff); }
        #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); width: 85%; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(0,0,0,0.98); padding: 40px 20px; border-radius: 40px; border: 3px solid var(--primary); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        #toast.toast-show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #fw-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; display: none; }
        .content-scroll { flex: 1; overflow-y: auto; margin-bottom: 10px; padding-top: 60px; scroll-behavior: smooth; }
        .hidden { display: none !important; }
        #ktv-box { font-size: 30px; font-weight: 800; line-height: 1.4; margin: 10px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 12px; }
        .word { color: var(--gold); transition: 0.2s; } 
        .word.active { color: var(--primary); text-shadow: 0 0 15px var(--primary); transform: scale(1.1); } 
        #chi-box { color: #fff; font-size: 18px; margin: 20px 0; opacity: 0.7; }
        #total-score { font-size: 85px; font-weight: 900; color: var(--success); margin: 0; line-height: 1; }
        .score-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #000; padding: 10px; border-radius: 20px; }
        .score-item b { font-size: 36px; display: block; color: #fff; }
        .score-item span { font-size: 14px; display: block; color: #aaa; }
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0080ff); color: #000; }
        .btn-dark { background: #222; color: #fff; border: 1px solid #444; }
        .login-input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 20px; box-sizing: border-box; }
    </style>
</head>
<body onclick="wakeAudioContext()">

<canvas id="fw-canvas"></canvas>
<div id="toast"><div id="toast-icon" style="font-size:80px;"></div><div id="toast-text" style="font-size:24px; font-weight:900;"></div></div>

<div class="card">
    <div id="login-ui">
        <div class="logo-area"><img src="bohan_logo.png" class="logo-img" alt="博瀚Logo" onerror="this.style.display='none'"></div>
        <h2 style="color:var(--primary); margin-top: 15px;">博瀚 AI 英語系統</h2>
        <p style="color:rgba(255,255,255,0.4); font-size: 12px;">V55.9.7 正式回傳版</p>
        <input type="text" id="user" class="login-input" placeholder="學生姓名">
        <input type="password" id="pass" class="login-input" placeholder="密碼">
        <div id="loading-zone"><div class="progress-track"><div class="progress-bar" id="p-bar"></div></div></div>
        <button id="login-btn" class="btn btn-primary" onclick="handleStartLoading()">進入學習空間</button>
        <div class="browser-tip">💡請用瀏覽器(safari或是chrome)開啟連結</div>
    </div>

    <div id="main-ui" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="content-scroll" id="scroller">
            <div id="ktv-box">載入中...</div>
            <div id="chi-box"></div>
        </div>
        <div class="controls">
            <div id="total-score">0</div>
            <div class="score-grid">
                <div class="score-item"><b id="s-f">0</b><span>流暢</span></div>
                <div class="score-item"><b id="s-c">0</b><span>完整</span></div>
                <div class="score-item"><b id="s-q">0</b><span>清晰</span></div>
            </div>
            <canvas id="wave" style="width:100%; height:50px; background:#000; border-radius:10px; margin-bottom:10px; border:1px solid #333;"></canvas>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button id="play-btn" class="btn btn-dark" style="flex:1" onclick="handlePlay()">🔊 聽範例</button>
                <button id="rec-btn" class="btn btn-dark" style="flex:2; color:var(--success);" onclick="toggleRec()">🎙️ 按我錄音</button>
            </div>
            <button id="next-btn" class="btn btn-primary" onclick="fastNext()" disabled>下一題 ➔</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzsyrYyvw-CLILnu8VZwjNzVcam58NihSXqkWSIbvtqXMXHOKAEZpKGeiLwYb-vIJoVEw/exec"; 
    let db = { users:[], questions:[] }, stu = "", cur = 0, isRec = false, latestResult = "", audioBlob = null;
    let audioCtx, ana, rec, stream, isPlaying = false;
    
    const vGood = new Audio('good.mp3'), vTry = new Audio('try.mp3'), vStudy = new Audio('study.mp3'), vNoSound = new Audio('nosound.mp3'), cheerAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

    async function wakeAudioContext() {
        if (!audioCtx || audioCtx.state === 'closed') audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    async function init() { try { const r = await fetch(`${API}?t=${Date.now()}`); const d = await r.json(); if(d.users) db = d; } catch(e) {} }
    window.onload = init;

    function handleStartLoading() {
        const u = document.getElementById('user').value.trim(), p = document.getElementById('pass').value.trim();
        const found = db.users.find(x => String(x[0]) === u && String(x[1]) === p);
        if(!found) { alert("驗證失敗"); return; }
        stu = u; document.getElementById('login-btn').style.display = 'none'; document.getElementById('loading-zone').style.display = 'block';
        let prg = 0; const timer = setInterval(() => {
            prg += 10; document.getElementById('p-bar').style.width = prg + '%';
            if(prg >= 100) { clearInterval(timer); setTimeout(() => { document.getElementById('login-ui').classList.add('hidden'); document.getElementById('main-ui').classList.remove('hidden'); renderQ(); }, 300); }
        }, 50);
    }

    function renderQ() {
        const q = db.questions[cur];
        document.getElementById('ktv-box').innerHTML = q.eng.split(" ").map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join(" ");
        document.getElementById('chi-box').innerText = q.chi;
        document.getElementById('total-score').innerText = "0";
        document.getElementById('next-btn').disabled = true;
        latestResult = ""; audioBlob = null;
        document.getElementById('scroller').scrollTop = 0;
        resetPlayState();
    }

    function resetPlayState() { window.speechSynthesis.cancel(); isPlaying = false; document.getElementById('play-btn').innerText = "🔊 聽範例"; document.querySelectorAll('.word').forEach(w => w.classList.remove('active')); }
    
    function playFull() {
        resetPlayState(); isPlaying = true; document.getElementById('play-btn').innerText = "⏹ 停止";
        const ut = new SpeechSynthesisUtterance(db.questions[cur].eng);
        ut.lang = 'en-US'; ut.rate = 0.7; let idx = 0;
        ut.onboundary = (e) => { 
            if(e.name === 'word' && isPlaying) { 
                const ws = document.querySelectorAll('.word');
                ws.forEach(s=>s.classList.remove('active')); 
                if(ws[idx]) { ws[idx].classList.add('active'); ws[idx].scrollIntoView({ behavior: 'smooth', block: 'center' }); idx++; }
            } 
        };
        ut.onend = () => { if(isPlaying) { 
            const ch = new SpeechSynthesisUtterance(db.questions[cur].chi); ch.lang = 'zh-TW';
            ch.onstart = () => { document.getElementById('chi-box').scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            ch.onend = () => resetPlayState();
            window.speechSynthesis.speak(ch); 
        }};
        window.speechSynthesis.speak(ut);
    }
    function handlePlay() { if (isPlaying) resetPlayState(); else playFull(); }

    async function toggleRec() {
        resetPlayState(); await wakeAudioContext(); 
        if (!isRec) {
            latestResult = ""; audioBlob = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                ana = audioCtx.createAnalyser(); ana.fftSize = 64;
                audioCtx.createMediaStreamSource(stream).connect(ana);
                isRec = true; drawWave();
                const mr = new MediaRecorder(stream); let chunks = [];
                mr.ondataavailable = e => chunks.push(e.data);
                mr.onstop = () => { audioBlob = new Blob(chunks, { type: 'audio/webm' }); stream.getTracks().forEach(t => t.stop()); };
                mr.start(); window.currentMR = mr;
                const Recog = window.webkitSpeechRecognition || window.SpeechRecognition;
                rec = new Recog(); rec.lang = 'en-US'; rec.continuous = true; rec.interimResults = true;
                rec.onresult = e => { latestResult = e.results[e.results.length - 1][0].transcript; };
                rec.start();
                document.getElementById('rec-btn').innerText = "⏹ 送出錄音"; document.getElementById('rec-btn').style.color = "var(--danger)";
            } catch (e) { alert("麥克風失敗"); }
        } else {
            isRec = false; if (rec) rec.stop(); if (window.currentMR) window.currentMR.stop();
            document.getElementById('rec-btn').innerText = "🎙️ 按我錄音"; document.getElementById('rec-btn').style.color = "var(--success)";
            setTimeout(calculateAI, 800);
        }
    }

    function drawWave() {
        if (!isRec || !ana) return; const cvs = document.getElementById('wave'), c = cvs.getContext('2d');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        const data = new Uint8Array(ana.frequencyBinCount);
        const render = () => { if (!isRec) return; requestAnimationFrame(render); ana.getByteFrequencyData(data);
            c.fillStyle = '#000'; c.fillRect(0, 0, cvs.width, cvs.height);
            for (let i = 0; i < 20; i++) { const h = (data[i] / 255) * cvs.height * 2.5; c.fillStyle = `hsl(${i * 18 + 180}, 100%, 60%)`; c.fillRect(i * (cvs.width/20), cvs.height - h, (cvs.width/20) - 4, h); }
        }; render();
    }

    function calculateAI() {
        if(!latestResult) { showToast("😤", "沒聽到聲音喔", "var(--danger)", 0); return; }
        const target = db.questions[cur].eng.toLowerCase().replace(/[.,!?]/g,"").split(/\s+/).filter(x => x);
        const spoken = latestResult.toLowerCase().split(/\s+/);
        let match = 0; target.forEach(w => { if(spoken.includes(w)) match++; });
        const rate = match / target.length;
        let total = rate >= 0.9 ? Math.floor(rate*3+27) : (rate >= 0.5 ? Math.floor(rate*14+13) : Math.max(5, Math.floor(rate*20)));
        document.getElementById('total-score').innerText = total;
        document.getElementById('s-f').innerText = Math.floor(total/3); document.getElementById('s-c').innerText = Math.floor(total/3); document.getElementById('s-q').innerText = total - Math.floor(total/3)*2;
        showToast(rate>=0.9?"👑":(rate>=0.5?"👍":"😤"), rate>=0.9?"好棒棒":(rate>=0.5?"再加油":"請認真"), rate>=0.9?"var(--success)":"var(--warning)", rate>=0.9?1:(rate>=0.5?2:3));
        document.getElementById('next-btn').disabled = false;
    }

    function showToast(i, t, b, type) {
        const el = document.getElementById('toast'); document.getElementById('toast-icon').innerText = i; document.getElementById('toast-text').innerText = t;
        el.style.borderColor = b; el.classList.add('toast-show');
        if (type === 1) vGood.play(); else if (type === 2) vTry.play(); else if (type === 3) vStudy.play(); else vNoSound.play();
        setTimeout(() => el.classList.remove('toast-show'), 2500);
    }

    async function fastNext() {
        document.getElementById('next-btn').disabled = true;
        const score = document.getElementById('total-score').innerText;
        
        // --- 核心修正：將音檔轉為 Base64 並上傳 ---
        let base64Audio = "";
        if (audioBlob) {
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            await new Promise(resolve => reader.onloadend = resolve);
            base64Audio = reader.result.split(',')[1];
        }

        fetch(API, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ student: stu, eng: db.questions[cur].eng, score: score, audio: base64Audio }) 
        });

        if (cur === db.questions.length - 1) runFinal(); else { cur++; renderQ(); }
    }

    function runFinal() {
        const cvs = document.getElementById('fw-canvas'); cvs.style.display = 'block'; const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight; cheerAudio.play();
        
        // 修正：在放煙火時就先「靜音排隊」，強迫瀏覽器認可語音
        const ut = new SpeechSynthesisUtterance("Congratulation, Mission completed!");
        ut.lang = 'en-US'; ut.rate = 0.8; ut.volume = 1;
        window.speechSynthesis.speak(ut);

        const pts = []; for(let i=0; i<150; i++) pts.push({ x: cvs.width/2, y: cvs.height/2, vx: (Math.random()-0.5)*22, vy: (Math.random()-0.5)*22, c: `hsl(${Math.random()*360},100%,60%)`, a: 1 });
        function anim() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,cvs.width,cvs.height);
            pts.forEach((p,i) => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.a-=0.008; ctx.globalAlpha=p.a; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill(); if(p.a<=0) pts.splice(i,1); });
            if(pts.length>0) requestAnimationFrame(anim); else { cvs.style.display='none'; showFinal(); }
        } anim();
    }

    function showFinal() {
        document.getElementById('main-ui').innerHTML = `<div style="margin-top:100px; padding:20px;">
            <div style="font-size:80px; animation:pop 0.6s;">🏆</div>
            <h1 style="color:var(--primary);">Mission completed!</h1>
            <h2>功課完成，上傳成功！</h2>
            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:40px; width:220px;">回主畫面</button>
        </div>`;
    }
</script>
</body>
</html>
