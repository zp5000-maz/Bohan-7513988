<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚 AI 英語</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 10px; }
        button { width: 80%; padding: 15px; margin: 10px; border-radius: 10px; font-size: 18px; font-weight: bold; }
        #wave { width: 100%; height: 50px; background: #000; border: 1px solid #444; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card" id="login-ui">
        <h2>博瀚 AI 英語</h2>
        <input type="text" id="u" placeholder="學生姓名"><br>
        <input type="password" id="p" placeholder="密碼"><br>
        <button onclick="login()" style="background:#00d4ff">進入</button>
    </div>

    <div class="card hidden" id="main-ui">
        <h3 id="q-eng" style="color:#ffc107"></h3>
        <p id="q-chi"></p>
        <div id="score" style="font-size: 50px; color:#00ffbb">0</div>
        <canvas id="wave"></canvas>
        <button onclick="sayIt()" style="background:#444; color:#fff">🔊 聽範例</button>
        <button id="rec-btn" onclick="runRec()" style="background:#222; color:#00ffbb; border:1px solid #00ffbb">🎙️ 按我錄音</button>
        <button id="next-btn" onclick="nextQ()" style="background:#0084a5; color:#fff" disabled>下一題 ➔</button>
    </div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbz9qemMm9yj8cd3FV_2nh42xdSbiuViQ6WSGr5vHhOHf76rS5DQm4OF3YR-uKwyrbrC2Q/exec"; // 務必替換
    let db, stu, cur=0, isRec=false, mr, chunks=[], audioCtx, ana, aniId;

    window.onload = async () => { const r = await fetch(API); db = await r.json(); };

    function login() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        if (db.users.some(x => x[0] === user && x[1] === pass)) {
            stu = user; document.getElementById('login-ui').className='hidden';
            document.getElementById('main-ui').className=''; showQ();
        } else alert("密碼錯了！");
    }

    function showQ() {
        document.getElementById('q-eng').innerText = db.questions[cur].eng;
        document.getElementById('q-chi').innerText = db.questions[cur].chi;
        document.getElementById('score').innerText = "0";
        document.getElementById('next-btn').disabled = true;
    }

    function sayIt() {
        const u = new SpeechSynthesisUtterance(db.questions[cur].eng);
        u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }

    // 動畫邏輯
    function draw() {
        if (!isRec) return;
        aniId = requestAnimationFrame(draw);
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteFrequencyData(data);
        const cvs = document.getElementById('wave'), ctx = cvs.getContext('2d');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        ctx.fillStyle = '#00ffbb';
        for (let i = 0; i < 30; i++) {
            const h = (data[i] / 255) * cvs.height;
            ctx.fillRect(i * (cvs.width/30), cvs.height - h, (cvs.width/30)-2, h);
        }
    }

    async function runRec() {
        if (!isRec) {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            ana = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(s).connect(ana);
            
            mr = new MediaRecorder(s); // iPhone 會自動選格式
            chunks = [];
            mr.ondataavailable = e => chunks.push(e.data);
            mr.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/mp4' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    document.getElementById('rec-btn').innerText = "辨識中...";
                    const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'recognize', audio: base64 }) });
                    const res = await r.json();
                    finish(res.transcript);
                };
                s.getTracks().forEach(t => t.stop());
            };
            mr.start(); isRec = true; draw();
            document.getElementById('rec-btn').innerText = "⏹ 停止";
        } else {
            isRec = false; mr.stop();
        }
    }

    function finish(txt) {
        document.getElementById('rec-btn').innerText = "🎙️ 按我錄音";
        if (txt === "EMPTY" || !txt) { alert("沒聽到聲音喔！"); return; }
        
        const target = db.questions[cur].eng.toLowerCase().replace(/[.,!?]/g,"");
        const spoken = txt.toLowerCase().replace(/[.,!?]/g,"");
        const score = spoken.includes(target) ? 100 : 50; // 簡易評分邏輯
        
        document.getElementById('score').innerText = score;
        document.getElementById('next-btn').disabled = false;
        window.lastTxt = txt;

        if (score >= 90) alert("太厲害了，好棒棒！");
        else if (score >= 60) alert("還不錯喔，再加油。");
        else alert("請認真學習。");
    }

    function nextQ() {
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ student: stu, eng: db.questions[cur].eng, score: document.getElementById('score').innerText, recognizedText: window.lastTxt }) });
        if (cur < db.questions.length - 1) { cur++; showQ(); } else { alert("完工！"); location.reload(); }
    }
</script>
</body>
</html>
