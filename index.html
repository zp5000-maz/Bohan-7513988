<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>博瀚 AI 英語</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --success: #00ffbb; --danger: #ff4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #111; padding: 30px 25px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; margin-top: 12px; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--primary); color: #000; }
        .btn-d { background: #222; color: #fff; border: 1px solid #444; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; font-size: 16px; }
        #wave { width: 100%; height: 50px; background: #000; border-radius: 10px; margin: 15px 0; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-ui">
        <h2 style="color:var(--primary)">博瀚 AI 英語</h2>
        <input type="text" id="user" placeholder="學生姓名">
        <input type="password" id="pass" placeholder="密碼">
        <button class="btn btn-p" onclick="doLogin()">進入學習</button>
    </div>

    <div id="main-ui" class="hidden">
        <div id="q-eng" style="font-size: 24px; color: #ffc107; font-weight: bold; margin-bottom: 5px;"></div>
        <div id="q-chi" style="opacity: 0.6; margin-bottom: 15px;"></div>
        <div id="score" style="font-size: 70px; font-weight: 900; color: var(--success); line-height: 1;">0</div>
        <canvas id="wave"></canvas>
        <button id="play-btn" class="btn btn-d" onclick="sayIt()">🔊 聽範例聲音</button>
        <button id="rec-btn" class="btn btn-d" style="color:var(--success)" onclick="runRec()">🎙️ 按我錄音</button>
        <button id="next-btn" class="btn btn-p" style="background:#0084a5; color:white;" onclick="nextQ()" disabled>儲存並下一題 ➔</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzea5griEMTiZTyYyV3q8bljTNQHDvWG6mSpprdhNxDXcnkb2sx-BzaLsuagEY1jgGQCQ/exec"; 
    let db, stu, cur=0, isRec=false, mr, chunks=[], audioCtx, ana, aniId;

    window.onload = async () => { try { const r = await fetch(API); db = await r.json(); } catch(e) {} };

    function doLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if (db.users.some(x => x[0] === u && x[1] === p)) {
            stu = u; document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden'); showQ();
        } else alert("密碼錯誤！");
    }

    function showQ() {
        const q = db.questions[cur];
        document.getElementById('q-eng').innerText = q.eng;
        document.getElementById('q-chi').innerText = q.chi;
        document.getElementById('score').innerText = "0";
        document.getElementById('next-btn').disabled = true;
    }

    function sayIt() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(db.questions[cur].eng);
        u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u);
    }

    function draw() {
        if (!isRec) return;
        aniId = requestAnimationFrame(draw);
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteFrequencyData(data);
        const cvs = document.getElementById('wave'), ctx = cvs.getContext('2d');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
        for (let i = 0; i < 25; i++) {
            const h = (data[i] / 255) * cvs.height * 1.5;
            ctx.fillStyle = `hsl(${180 + i * 4}, 100%, 50%)`;
            ctx.fillRect(i * (cvs.width/25), cvs.height - h, (cvs.width/25)-2, h);
        }
    }

    async function runRec() {
        if (!isRec) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ana = audioCtx.createAnalyser(); ana.fftSize = 64;
                audioCtx.createMediaStreamSource(s).connect(ana);

                mr = new MediaRecorder(s);
                chunks = [];
                mr.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                mr.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/mp4' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        // 【終極修正】移除 Base64 的標頭，只傳純數據
                        const base64 = reader.result.split(',')[1];
                        document.getElementById('rec-btn').innerText = "🤖 辨識中...";
                        try {
                            const r = await fetch(API, { 
                                method: 'POST', 
                                body: JSON.stringify({ action: 'recognize', audio: base64 }) 
                            });
                            const res = await r.json();
                            handleResult(res.transcript);
                        } catch (err) {
                            alert("系統繁忙，請再試一次！");
                            resetBtn();
                        }
                    };
                    s.getTracks().forEach(t => t.stop());
                };
                mr.start(); isRec = true; draw();
                document.getElementById('rec-btn').innerText = "⏹ 停止錄音";
                document.getElementById('rec-btn').style.color = "var(--danger)";
            } catch (e) { alert("請允許使用麥克風！"); }
        } else {
            isRec = false; cancelAnimationFrame(aniId); mr.stop();
            document.getElementById('rec-btn').disabled = true;
        }
    }

    function resetBtn() {
        document.getElementById('rec-btn').disabled = false;
        document.getElementById('rec-btn').innerText = "🎙️ 按我錄音";
        document.getElementById('rec-btn').style.color = "var(--success)";
    }

    function handleResult(txt) {
        resetBtn();
        if (!txt || txt === "EMPTY" || txt.startsWith("ERROR")) { 
            alert("沒聽到聲音喔，請大聲一點再試一次！"); 
            return; 
        }
        
        const target = db.questions[cur].eng.toLowerCase().replace(/[.,!?]/g,"").split(" ");
        const spoken = txt.toLowerCase().replace(/[.,!?]/g,"").split(" ");
        let match = 0; target.forEach(w => { if(spoken.includes(w)) match++; });
        let s = Math.floor((match / target.length) * 100);
        
        document.getElementById('score').innerText = s;
        document.getElementById('next-btn').disabled = false;
        window.lastTxt = txt;

        if (s >= 90) alert("太厲害了，好棒棒！");
        else if (s >= 60) alert("還不錯喔，再加油。");
        else alert("請認真學習。");
    }

    function nextQ() {
        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ student: stu, eng: db.questions[cur].eng, score: document.getElementById('score').innerText, recognizedText: window.lastTxt }) });
        if (cur < db.questions.length - 1) { cur++; showQ(); }
        else { alert("全部題目練習完囉！"); location.reload(); }
    }
</script>
</body>
</html>
